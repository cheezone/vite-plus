name: Publish to pkg.pr.new

# https://pkg.pr.new/~/voidzero-dev/vite-plus

permissions: {}

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-rust:
    name: Build bindings and binaries
    if: >-
      github.repository == 'voidzero-dev/vite-plus' &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'pkg.pr.new')))
    needs: prepare
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-release-build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      cache-key: pkg-pr-new

  prepare:
    if: >-
      github.repository == 'voidzero-dev/vite-plus' &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'pkg.pr.new')))
    name: Compute snapshot version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      # pkg-pr-new rewrites the published version anyway, but we still need a
      # unique snapshot version so `napi pre-publish` writes consistent
      # optionalDependencies entries across the platform packages.
      - name: Compute version
        id: version
        run: |
          short_sha=$(git rev-parse --short=7 HEAD)
          echo "version=0.0.0-pkg-pr-new.${short_sha}" >> "$GITHUB_OUTPUT"

  publish:
    if: >-
      github.repository == 'voidzero-dev/vite-plus' &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'pkg.pr.new')))
    name: Pkg Preview
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-rust
    permissions:
      # pkg-pr-new comments on PRs and posts run statuses with this token.
      contents: read
      pull-requests: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: ./.github/actions/clone

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Download cli dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: packages/cli/dist
          pattern: cli
          merge-multiple: true

      - name: Download cli docs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: packages/cli/docs
          pattern: cli-docs
          merge-multiple: true

      - name: Download cli binding
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: packages/cli/artifacts
          pattern: vite-plus-native-*

      - name: Download core dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: packages/core/dist
          pattern: core
          merge-multiple: true

      - uses: ./.github/actions/download-rolldown-binaries
        with:
          github-token: ${{ github.token }}
          target: x86_64-unknown-linux-gnu
          upload: 'false'

      - name: Download Rust CLI binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: rust-cli-artifacts
          pattern: vite-global-cli-*

      - name: Move Rust CLI binaries to target directories
        run: |
          for artifact_dir in rust-cli-artifacts/vite-global-cli-*/; do
            if [ -d "$artifact_dir" ]; then
              dir_name=$(basename "$artifact_dir")
              target_name=${dir_name#vite-global-cli-}
              mkdir -p "target/${target_name}/release"
              cp -r "$artifact_dir"* "target/${target_name}/release/"
            fi
          done
          vp_files=$(find target -name "vp*" -type f 2>/dev/null || echo "")
          if [ -z "$vp_files" ]; then
            echo "Error: No vp binaries found in target directory"
            find rust-cli-artifacts -type f || true
            exit 1
          fi
          echo "Found binaries:"
          echo "$vp_files"

      - name: Set npm packages version
        run: |
          sed -i "s/\"version\": \"0.0.0\"/\"version\": \"${VERSION}\"/" packages/core/package.json
          sed -i "s/\"version\": \"0.0.0\"/\"version\": \"${VERSION}\"/" packages/test/package.json
          sed -i "s/\"version\": \"0.0.0\"/\"version\": \"${VERSION}\"/" packages/cli/package.json

      - name: Build test package
        run: pnpm --filter=@voidzero-dev/vite-plus-test build

      # Reuses the release script with SKIP_NPM_PUBLISH=true so it stops short
      # of `npm publish` and leaves packages/cli/{npm,cli-npm}/* on disk for
      # pkg-pr-new to upload.
      - name: Prepare native addon and CLI binary packages
        run: node ./packages/cli/publish-native-addons.ts
        env:
          SKIP_NPM_PUBLISH: 'true'

      - name: List prepared packages
        run: |
          ls -R ./packages/cli/npm
          ls -R ./packages/cli/cli-npm

      - name: Publish to pkg.pr.new
        run: |
          pnpm dlx pkg-pr-new publish --compact --pnpm \
            './packages/cli/npm/*' \
            './packages/cli/cli-npm/*' \
            './packages/cli' \
            './packages/core' \
            './packages/test'
